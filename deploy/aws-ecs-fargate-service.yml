AWSTemplateFormatVersion: "2010-09-09"
Description: ECS Fargate service with an Application Load Balancer for the Bedrock KB Streamlit chatbot.

Parameters:
  AppName:
    Type: String
    Default: bedrock-kb-chatbot
  ImageUri:
    Type: String
    Description: Full ECR image URI, including tag.
  RuntimeRoleArn:
    Type: String
    Description: IAM role ARN used by the running ECS task.
  AwsRegion:
    Type: String
    Default: us-east-1
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  BedrockKnowledgeBaseId:
    Type: String
  BedrockModelArn:
    Type: String
  ChatHistoryTable:
    Type: String
  ChatHistoryBucket:
    Type: String
  ChatHistoryPrefix:
    Type: String
    Default: chat-history
  DesiredCount:
    Type: Number
    Default: 2
    MinValue: 1
    Description: Initial number of ECS tasks to run.
  MinTaskCount:
    Type: Number
    Default: 2
    MinValue: 1
    Description: Minimum number of ECS tasks kept running by autoscaling.
  MaxTaskCount:
    Type: Number
    Default: 6
    MinValue: 2
    Description: Maximum number of ECS tasks allowed by autoscaling.
  CpuTargetValue:
    Type: Number
    Default: 60
    MinValue: 10
    MaxValue: 90
    Description: Average ECS service CPU percentage that triggers target tracking autoscaling.
  MemoryTargetValue:
    Type: Number
    Default: 70
    MinValue: 10
    MaxValue: 90
    Description: Average ECS service memory percentage that triggers target tracking autoscaling.
  ContainerPort:
    Type: Number
    Default: 8501
  AllowedHttpPrefixListId:
    Type: String
    Default: ""
    Description: Optional prefix list allowed to reach the public ALB on HTTP, such as the CloudFront origin-facing prefix list. Leave blank to allow 0.0.0.0/0.

Conditions:
  UseCloudFrontOnlyIngress: !Not [!Equals [!Ref AllowedHttpPrefixListId, ""]]
  UsePublicHttpIngress: !Equals [!Ref AllowedHttpPrefixListId, ""]

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref AppName

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AppName}"
      RetentionInDays: 30

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow public HTTP traffic to the chatbot load balancer.
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  LoadBalancerHttpIngressFromInternet:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: UsePublicHttpIngress
    Properties:
      GroupId: !Ref LoadBalancerSecurityGroup
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      CidrIp: 0.0.0.0/0

  LoadBalancerHttpIngressFromPrefixList:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: UseCloudFrontOnlyIngress
    Properties:
      GroupId: !Ref LoadBalancerSecurityGroup
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      SourcePrefixListId: !Ref AllowedHttpPrefixListId

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow ALB traffic to the chatbot ECS tasks.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AppName}-alb"
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      Subnets: !Ref PublicSubnetIds
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: "3600"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AppName}-tg"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: /_stcore/health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: stickiness.enabled
          Value: "true"
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: "86400"

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref AppName
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: "1024"
      Memory: "2048"
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !Ref RuntimeRoleArn
      ContainerDefinitions:
        - Name: !Ref AppName
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            - Name: AWS_REGION
              Value: !Ref AwsRegion
            - Name: APP_ENV
              Value: production
            - Name: BEDROCK_KB_ID
              Value: !Ref BedrockKnowledgeBaseId
            - Name: BEDROCK_MODEL_ARN
              Value: !Ref BedrockModelArn
            - Name: BEDROCK_NUMBER_OF_RESULTS
              Value: "5"
            - Name: BEDROCK_SEARCH_TYPE
              Value: DEFAULT
            - Name: BEDROCK_MAX_TOKENS
              Value: "2048"
            - Name: BEDROCK_TEMPERATURE
              Value: "0.2"
            - Name: BEDROCK_TOP_P
              Value: "0.9"
            - Name: BEDROCK_QUERY_DECOMPOSITION
              Value: "false"
            - Name: CHAT_HISTORY_MODE
              Value: aws
            - Name: CHAT_HISTORY_DYNAMODB_TABLE
              Value: !Ref ChatHistoryTable
            - Name: CHAT_HISTORY_S3_BUCKET
              Value: !Ref ChatHistoryBucket
            - Name: CHAT_HISTORY_S3_PREFIX
              Value: !Ref ChatHistoryPrefix
            - Name: CHAT_HISTORY_CONTEXT_MESSAGE_LIMIT
              Value: "40"
            - Name: CHAT_HISTORY_CONTEXT_MAX_CHARS
              Value: "6000"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AwsRegion
              awslogs-stream-prefix: ecs

  Service:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: !Ref AppName
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      HealthCheckGracePeriodSeconds: 120
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroup
          Subnets: !Ref PublicSubnetIds
      LoadBalancers:
        - ContainerName: !Ref AppName
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup

  ServiceScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: Service
    Properties:
      MaxCapacity: !Ref MaxTaskCount
      MinCapacity: !Ref MinTaskCount
      ResourceId: !Sub
        - service/${ClusterName}/${ServiceName}
        - ClusterName: !Ref Cluster
          ServiceName: !GetAtt Service.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ServiceCpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${AppName}-cpu-target-tracking"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ServiceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: !Ref CpuTargetValue
        ScaleInCooldown: 300
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization

  ServiceMemoryScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${AppName}-memory-target-tracking"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ServiceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: !Ref MemoryTargetValue
        ScaleInCooldown: 300
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization

Outputs:
  ClusterName:
    Value: !Ref Cluster
  ServiceName:
    Value: !GetAtt Service.Name
  LoadBalancerDnsName:
    Value: !GetAtt LoadBalancer.DNSName
  ServiceUrl:
    Value: !Sub "http://${LoadBalancer.DNSName}"
  LogGroupName:
    Value: !Ref LogGroup
  MinTaskCount:
    Value: !Ref MinTaskCount
  MaxTaskCount:
    Value: !Ref MaxTaskCount
