AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFront HTTPS endpoint for the Bedrock KB Streamlit chatbot ALB.

Parameters:
  AppName:
    Type: String
    Default: bedrock-kb-chatbot
  AlbDnsName:
    Type: String
    Description: DNS name of the existing Application Load Balancer, without http://.
  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All

Resources:
  HttpsDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "HTTPS endpoint for ${AppName}"
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: !Ref PriceClass
        Origins:
          - Id: !Sub "${AppName}-alb-origin"
            DomainName: !Ref AlbDnsName
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 80
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 60
        DefaultCacheBehavior:
          TargetOriginId: !Sub "${AppName}-alb-origin"
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        CustomErrorResponses:
          - ErrorCode: 403
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ErrorCachingMinTTL: 0

Outputs:
  DistributionId:
    Value: !Ref HttpsDistribution
  DistributionDomainName:
    Value: !GetAtt HttpsDistribution.DomainName
  HttpsUrl:
    Value: !Sub "https://${HttpsDistribution.DomainName}"
