AWSTemplateFormatVersion: "2010-09-09"
Description: DynamoDB, S3, and IAM resources for the Bedrock KB Streamlit chatbot.

Parameters:
  AppName:
    Type: String
    Default: bedrock-kb-chatbot
  HistoryBucketName:
    Type: String
    Description: Globally unique S3 bucket name for immutable chat event copies.
  BedrockKnowledgeBaseArn:
    Type: String
    Description: ARN of the Bedrock Knowledge Base used by the app.
  BedrockModelOrInferenceProfileArn:
    Type: String
    Description: ARN of the Bedrock model or inference profile used by the app.

Resources:
  ChatHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AppName}-history"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  ChatHistoryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref HistoryBucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: RetainChatLogs
            Status: Enabled
            NoncurrentVersionExpirationInDays: 365

  AppRuntimeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-runtime-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - tasks.apprunner.amazonaws.com
                - ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockKbChatbotRuntimePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource:
                  - !Ref BedrockKnowledgeBaseArn
              - Effect: Allow
                Action:
                  - bedrock:GetInferenceProfile
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Ref BedrockModelOrInferenceProfileArn
                  - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt ChatHistoryTable.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub "${ChatHistoryBucket.Arn}/*"

Outputs:
  ChatHistoryTableName:
    Value: !Ref ChatHistoryTable
  ChatHistoryBucketName:
    Value: !Ref ChatHistoryBucket
  AppRuntimeRoleArn:
    Value: !GetAtt AppRuntimeRole.Arn
