AWSTemplateFormatVersion: "2010-09-09"
Description: CodeBuild resources for building and pushing the chatbot image to ECR.

Parameters:
  AppName:
    Type: String
    Default: bedrock-kb-chatbot
  SourceBucketName:
    Type: String
    Description: Globally unique S3 bucket name for CodeBuild source archives.
  EcrRepositoryArn:
    Type: String
    Description: ARN of the ECR repository that stores the chatbot image.
  EcrRepositoryName:
    Type: String
    Default: bedrock-kb-chatbot

Resources:
  BuildSourceBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref SourceBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-codebuild-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildImagePushPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource:
                  - !Sub "${BuildSourceBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:DescribeRepositories
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: !Ref EcrRepositoryArn

  ImageBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${AppName}-image-build"
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: IMAGE_REPO_NAME
            Value: !Ref EcrRepositoryName
      Source:
        Type: S3
        Location: !Sub "${BuildSourceBucket}/${AppName}-source.zip"
      TimeoutInMinutes: 30

Outputs:
  BuildSourceBucketName:
    Value: !Ref BuildSourceBucket
  CodeBuildProjectName:
    Value: !Ref ImageBuildProject
  CodeBuildServiceRoleArn:
    Value: !GetAtt CodeBuildServiceRole.Arn
